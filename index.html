<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Learning Platform</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Enter Username">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- MAIN APP -->
<div id="app">

<!-- NAVBAR -->
<nav>
    <div class="logo">E-Learning</div>
    <div class="nav-links">
        <a onclick="showSection('home')">Home</a>
        <a onclick="showSection('courses')">Courses</a>
        <a onclick="showSection('dashboard')">Dashboard</a>
        <a onclick="showSection('profile')">Profile</a>
        <a onclick="logout()">Logout</a>
    </div>
</nav>

<!-- HOME -->
<section id="home" class="section active">
    <h1>Welcome, <span id="userDisplay"></span></h1>
    <p>Learn Anytime, Anywhere 🚀</p>
</section>

<!-- COURSES -->
<section id="courses" class="section">
    <h2>Courses</h2>

    <div class="course-container">

        <div class="course-card" onclick="openCourse('HTML & CSS',
        'https://www.youtube.com/embed/HBqWsrqK89U',
        'https://drive.google.com/file/d/1ueiltHZ87veA3gbHumM13qwMORfTu3EJ/view?usp=drivesdk')">
            HTML & CSS
        </div>

        <div class="course-card" onclick="openCourse('JavaScript',
        'https://www.youtube.com/embed/ajdRvxDWH4w&list=PLGjplNEQ1it_oTvuLRNqXfz_v_0pq6unW',
        'https://drive.google.com/file/d/1LF9eSdLC4ZmrOH-j4MOtPCRiTwSsCCxA/view?usp=drivesdk')">
            JavaScript
        </div>

        <div class="course-card" onclick="openCourse('Python',
        'https://www.youtube.com/embed/t2_Q2BRzeEE&list=PLGjplNEQ1it8-0CmoljS5yeV-GlKSUEt0',
        'https://drive.google.com/file/d/1KnOOS6eN9NBIc5-QRIeVmm5bZ68pw7Q_/view?usp=drivesdk')">
            Python
        </div>

        <div class="course-card" onclick="openCourse('SQL',
        'https://www.youtube.com/embed/hlGoQC332VM',
        'https://drive.google.com/file/d/15vZ0P4T9-hessFXWelvOCbhujQLAtg06/view?usp=drivesdk')">
            SQL
        </div>

    </div>
</section>

<!-- PLAYER -->
<section id="player" class="section">
    <h2 id="courseTitle"></h2>

    <button class="enroll" onclick="enroll()">Enroll</button>

    <iframe id="videoPlayer"></iframe>

    <p>
        <a id="notesLink" target="_blank">Open Notes</a>
    </p>

    <button onclick="showSection('courses')">⬅ Back</button>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="section">
    <h2>Progress</h2>
    <div id="progressBox"></div>
</section>

<!-- PROFILE -->
<section id="profile" class="section">
    <h2>Profile</h2>
    <p>User: <span id="profileUser"></span></p>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
